name: "User Story"
description: "Describe a new feature or improvement from a user perspective."
title: "[US] - "
assignees:
  - vfourny
body:
  - type: markdown
    attributes:
      value: "## 🎯 User Story"

  - type: input
    id: as_a
    attributes:
      label: "As a"
      description: "Who is this story for?"
      placeholder: "user, admin, developer..."
    validations:
      required: true

  - type: input
    id: i_want
    attributes:
      label: "I want"
      description: "What is the goal or feature?"
      placeholder: "to create an account, view my dashboard, receive notifications..."
    validations:
      required: true

  - type: input
    id: so_that
    attributes:
      label: "So that"
      description: "What value does this deliver?"
      placeholder: "I can save time, secure my data, improve my experience..."
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: "Acceptance criteria"
      description: "List the conditions that must be met for this story to be considered done."
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: "Additional context"
      description: "Any extra information, constraints, or references."
    validations:
      required: false
