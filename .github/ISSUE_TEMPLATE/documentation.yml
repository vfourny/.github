---
name: Documentation Request
description: Suggest missing or improved documentation.
title: "[Doc]: "
assignees:
  - vfourny
body:
  - type: textarea
    id: description
    attributes:
      label: What needs to be documented?
      description: A clear and concise description of the documentation you'd like to see.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context or references that may help.
    validations:
      required: false
